name: CI/CD — Web (Tests → Build → Deploy)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: registry.digitalocean.com/twosix-registry
  IMAGE_NAME: two-six-web
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Gate de Calidad — Tests deben pasar antes del deploy
  # ──────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests Unitarios
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 3. Instalar dependencias
        run: npm ci

      - name: 4. Ejecutar Tests con Cobertura
        run: npm test -- --forceExit --passWithNoTests
        env:
          NODE_ENV: test

      - name: 5. Subir Reporte de Cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-web
          path: coverage/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Build & Push — Solo se ejecuta si los tests pasaron
  # ──────────────────────────────────────────────────────────────
  build_and_push:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: test  # ← Bloqueo: No deploya si los tests fallan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Instalar doctl (DigitalOcean CLI)
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: 3. Autenticarse en el Container Registry de DO
        run: doctl registry login --expiry-seconds 3600

      - name: 4. Borrar tags antiguos y ejecutar Garbage Collection
        run: |
          doctl registry repository list-manifests ${{ env.IMAGE_NAME }} --format Digest,Tags --no-header | grep -v "latest" | awk '{print $1}' | xargs -I {} doctl registry repository delete-manifest ${{ env.IMAGE_NAME }} {} --force || true
          echo "Iniciando proceso de Garbage Collection en Digital Ocean para depurar almacenamiento físico..."
          doctl registry garbage-collection start --force || true

      - name: 5. Construir la Imagen (Docker Build) usando la RAM de GitHub
        run: docker build --build-arg NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }} -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .

      - name: 6. Esperar fin de GC y Subir imagen al Registry
        run: |
          echo "Verificando el estado del Garbage Collection antes de subir (Evita bloqueo y Quota Exceeded)..."
          while doctl registry garbage-collection get-active >/dev/null 2>&1; do
            echo "GC en progreso... Esperando 15 segundos."
            sleep 15
          done
          echo "Garbage collection ha finalizado o no hay ninguno activo. Procediendo con el push de la nueva imagen."
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
